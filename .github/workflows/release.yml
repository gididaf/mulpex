name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: tar -czf mulpex-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release mulpex

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: mulpex-${{ matrix.target }}.tar.gz
